<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault Command Center</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard-container {
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 85%;
            max-width: 700px;
        }

        h1 { color: #58a6ff; letter-spacing: 2px; margin-bottom: 5px; }
        
        /* The Arm System Button */
        #armBtn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        #armBtn:hover { background-color: #2ea043; }
        
        #authBadge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .locked { background-color: #30363d; color: #ff7b72; border: 1px solid #ff7b72; }
        .unlocked { background-color: #30363d; color: #3fb950; border: 1px solid #3fb950; }

        #statusBox {
            font-size: 2em;
            font-weight: bold;
            padding: 30px;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .secure { background-color: #238636; color: white; border: 2px solid #2ea043; }
        .auth-access { background-color: #1f6feb; color: white; border: 2px solid #388bfd; }
        .warning { background-color: #d29922; color: black; border: 2px solid #e3b341; }
        .critical { 
            background-color: #da3633; 
            color: white; 
            border: 2px solid #f85149;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        .timestamp { margin-top: 20px; font-size: 0.9em; color: #8b949e; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Vault Security</h1>
        
        <button id="armBtn">Arm Dashboard (Enable Alarms)</button>
        <br>
        
        <div id="authBadge" class="locked">SYSTEM LOCKED</div>
        <div id="statusBox" class="secure">CONNECTING...</div>
        <div class="timestamp" id="timeBox">Awaiting data stream...</div>
    </div>

    <audio id="sirenAudio" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" loop></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDuwgLK0qFc2R4i8ll_6NdKuo_tc1fNWrU",
            authDomain: "bank-vault-8e868.firebaseapp.com",
            projectId: "bank-vault-8e868",
            storageBucket: "bank-vault-8e868.firebasestorage.app",
            messagingSenderId: "23788039726",
            appId: "1:23788039726:web:c2cf97ee10477968fdb9bf",
            measurementId: "G-B9W11GXFXD",
            databaseURL: "https://bank-vault-8e868-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const statusRef = ref(db, 'Vault/Status');
        const authRef = ref(db, 'Vault/Auth');

        const siren = document.getElementById('sirenAudio');
        const armBtn = document.getElementById('armBtn');
        let notificationsEnabled = false;

        // Function to handle the Alarm Logic (Shared by listener and button)
        function checkAndTriggerAlarm(statusData) {
            const statusBox = document.getElementById('statusBox');
            statusBox.innerText = statusData;

            if (statusData.includes("SECURE") || statusData.includes("AUTHORIZED")) {
                statusBox.className = statusData.includes("SECURE") ? "secure" : "auth-access";
                siren.pause();
                siren.currentTime = 0;
            } else if (statusData.includes("WARNING") || statusData.includes("ALERT")) {
                statusBox.className = "warning";
                siren.pause();
            } else if (statusData.includes("CRITICAL") || statusData.includes("BREACH")) {
                statusBox.className = "critical";
                // This will now work because it's called after a click or during a live update
                siren.play().catch(e => console.log("Audio waiting for user arming..."));
                
                if (notificationsEnabled) {
                    new Notification("VAULT BREACHED", { body: statusData, icon: "https://cdn-icons-png.flaticon.com/512/595/595067.png" });
                }
            }
        }

        // --- THE "ARM" BUTTON FIX ---
        armBtn.addEventListener('click', function() {
            // 1. Request/Verify Notifications
            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    notificationsEnabled = true;
                    this.innerText = "Dashboard Armed & Synced";
                    this.style.backgroundColor = "#30363d";
                }
            });

            // 2. Unlock Audio
            siren.play().then(() => {
                siren.pause();
                siren.currentTime = 0;
            });

            // 3. FORCE SYNC: Check current status immediately upon clicking
            get(statusRef).then((snapshot) => {
                if (snapshot.exists()) {
                    checkAndTriggerAlarm(snapshot.val());
                }
            });
        });

        // Live Listeners
        onValue(authRef, (snapshot) => {
            const authData = snapshot.val();
            const authBadge = document.getElementById('authBadge');
            if (authData) {
                authBadge.innerText = "SYSTEM " + authData;
                authBadge.className = (authData === "UNLOCKED") ? "unlocked" : "locked";
            }
        });

        onValue(statusRef, (snapshot) => {
            if (snapshot.exists()) {
                checkAndTriggerAlarm(snapshot.val());
            }
        });
    </script>
</body>
</html>
